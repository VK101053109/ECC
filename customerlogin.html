<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">


    <title>Customer Login | ECC</title>


    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


    <link rel="stylesheet" href="style.css">



    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>


    <script src="firebase-config.js"></script>

    <script defer src="customerlogin.js"></script>


</head>



<body class="page-shell">





<nav class="navbar navbar-inverse navbar-fixed-top site-nav">


    <div class="page-container">


        <div class="navbar-header">

            <a class="navbar-brand" href="index.html">

                ECC

            </a>

        </div>





        <ul class="nav navbar-nav navbar-right">


            <li>
                <a href="index.html">
                    Home
                </a>
            </li>


            <li>
                <a href="about.html">
                    About
                </a>
            </li>


            <li>
                <a href="order.html">
                    Order
                </a>
            </li>


            <li>
                <a href="login.html">
                    Admin
                </a>
            </li>


        </ul>



    </div>


</nav>







<main class="page-container">





    <section class="hero">





        <div>



            <p class="hero-eyebrow">
                Customer Account
            </p>




            <h1>
                Login to ECC
            </h1>





            <p class="lead-copy">

                Sign in to continue and manage your orders.

            </p>






            <div class="summary-card">





                <div class="form-group">

                    <label>Email</label>

                    <input
                            id="email"
                            class="form-control"
                            type="email"
                            placeholder="Enter email">

                </div>






                <div class="form-group">

                    <label>Password</label>

                    <input
                            id="password"
                            class="form-control"
                            type="password"
                            placeholder="Enter password">

                </div>






                <button

                        id="loginButton"

                        class="btn btn-accent"

                        type="button">

                    <i class="fa fa-sign-in"></i>

                    Login

                </button>





                <button

                        id="signupButton"

                        class="btn btn-outline-accent"

                        type="button">

                    Create Account

                </button>






                <p id="message" class="message-line"></p>





            </div>





        </div>








        <div class="summary-card">


            <h3>
                Customer Access
            </h3>


            <ul class="story-list">


                <li>
                    Save your login.
                </li>


                <li>
                    View submitted orders.
                </li>


                <li>
                    Order faster next time.
                </li>


            </ul>



        </div>






    </section>





</main>






</body>

</html>
